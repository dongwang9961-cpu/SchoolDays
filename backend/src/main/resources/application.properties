spring.application.name=schooldays
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/schooldays}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jooq.sql-dialect=postgres

schooldays.public-base-url=${SCHOOLDAYS_PUBLIC_BASE_URL:http://localhost:8080}
schooldays.frontend-base-url=${SCHOOLDAYS_FRONTEND_BASE_URL:http://localhost:5173}
schooldays.cors.allowed-origins=${SCHOOLDAYS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,https://www.schooldays.cc,https://schooldays.cc}
schooldays.security.jwt.issuer=${SCHOOLDAYS_JWT_ISSUER:schooldays}
schooldays.security.jwt.current-key-id=${SCHOOLDAYS_JWT_CURRENT_KEY_ID:primary}
schooldays.security.jwt.keys.primary=${SCHOOLDAYS_JWT_SECRET}
schooldays.security.jwt.access-token-ttl-minutes=${SCHOOLDAYS_JWT_ACCESS_TOKEN_TTL_MINUTES:720}
schooldays.security.google.client-id=${SCHOOLDAYS_GOOGLE_CLIENT_ID:${SCHOOLDAYS_GMAIL_CLIENT_ID:}}
schooldays.security.google.client-secret=${SCHOOLDAYS_GOOGLE_CLIENT_SECRET:${SCHOOLDAYS_GMAIL_CLIENT_SECRET:}}
schooldays.security.google.redirect-uri=${SCHOOLDAYS_GOOGLE_REDIRECT_URI:}
schooldays.security.google.token-uri=${SCHOOLDAYS_GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
schooldays.security.google.user-info-uri=${SCHOOLDAYS_GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
schooldays.gmail.client-id=${SCHOOLDAYS_GMAIL_CLIENT_ID:}
schooldays.gmail.client-secret=${SCHOOLDAYS_GMAIL_CLIENT_SECRET:}
schooldays.gmail.redirect-uri=${SCHOOLDAYS_GMAIL_REDIRECT_URI:http://localhost:8080/api/oauth/google/gmail/callback}
schooldays.gmail.token-uri=${SCHOOLDAYS_GMAIL_TOKEN_URI:https://oauth2.googleapis.com/token}
schooldays.gmail.user-info-uri=${SCHOOLDAYS_GMAIL_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
schooldays.gmail.send-uri=${SCHOOLDAYS_GMAIL_SEND_URI:https://gmail.googleapis.com/gmail/v1/users/me/messages/send}
schooldays.system-email.provider=${SCHOOLDAYS_SYSTEM_EMAIL_PROVIDER:log}
schooldays.system-email.api-key=${SCHOOLDAYS_SYSTEM_EMAIL_API_KEY:}
schooldays.system-email.from-email=${SCHOOLDAYS_SYSTEM_EMAIL_FROM_EMAIL:noreply@schooldays.cc}
schooldays.system-email.resend.send-uri=${SCHOOLDAYS_SYSTEM_EMAIL_RESEND_SEND_URI:https://api.resend.com/emails}
schooldays.seed-test-data.enabled=${SCHOOLDAYS_SEED_TEST_DATA:false}

management.endpoints.web.exposure.include=health,info
server.port=${PORT:8080}
