spring:
  application:
    name: schooldays
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/schooldays}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 0
      maximum-pool-size: 2
      idle-timeout: 60000
      max-lifetime: 600000
  flyway:
    enabled: true
    locations: classpath:db/migration
  jooq:
    sql-dialect: postgres

schooldays:
  public-base-url: ${SCHOOLDAYS_PUBLIC_BASE_URL:http://localhost:8080}
  frontend-base-url: ${SCHOOLDAYS_FRONTEND_BASE_URL:http://localhost:5173}
  cors:
    allowed-origins: ${SCHOOLDAYS_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,https://www.schooldays.cc,https://schooldays.cc,https://*.schooldays.cc}
  security:
    jwt:
      issuer: ${SCHOOLDAYS_JWT_ISSUER:schooldays}
      current-key-id: ${SCHOOLDAYS_JWT_CURRENT_KEY_ID:primary}
      keys:
        primary: ${SCHOOLDAYS_JWT_SECRET}
      access-token-ttl-minutes: ${SCHOOLDAYS_JWT_ACCESS_TOKEN_TTL_MINUTES:720}
    google:
      client-id: ${SCHOOLDAYS_GOOGLE_CLIENT_ID:${SCHOOLDAYS_GMAIL_CLIENT_ID:}}
      client-secret: ${SCHOOLDAYS_GOOGLE_CLIENT_SECRET:${SCHOOLDAYS_GMAIL_CLIENT_SECRET:}}
      redirect-uri: ${SCHOOLDAYS_GOOGLE_REDIRECT_URI:}
      token-uri: ${SCHOOLDAYS_GOOGLE_TOKEN_URI:https://oauth2.googleapis.com/token}
      user-info-uri: ${SCHOOLDAYS_GOOGLE_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
  gmail:
    client-id: ${SCHOOLDAYS_GMAIL_CLIENT_ID:}
    client-secret: ${SCHOOLDAYS_GMAIL_CLIENT_SECRET:}
    redirect-uri: ${SCHOOLDAYS_GMAIL_REDIRECT_URI:http://localhost:8080/api/oauth/google/gmail/callback}
    token-uri: ${SCHOOLDAYS_GMAIL_TOKEN_URI:https://oauth2.googleapis.com/token}
    user-info-uri: ${SCHOOLDAYS_GMAIL_USER_INFO_URI:https://openidconnect.googleapis.com/v1/userinfo}
    send-uri: ${SCHOOLDAYS_GMAIL_SEND_URI:https://gmail.googleapis.com/gmail/v1/users/me/messages/send}
  seed-test-data:
    enabled: ${SCHOOLDAYS_SEED_TEST_DATA:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: ${PORT:8080}
